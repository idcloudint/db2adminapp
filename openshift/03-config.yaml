---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db2-day2ops-backend-config
  namespace: db2-day2ops
  labels:
    app: db2-day2ops
    component: backend
data:
  PORT: "3001"
  NODE_ENV: "production"
  DB2_NAMESPACE: "db2-community"
  DB2_POD_LABEL: "app=db2"
  DB2_SERVICE: "db2-service"
  DB2_PORT: "50000"
  DB2_DATABASE: "SAMPLE"
  DB2_USER: "db2inst1"
  COLLECTION_INTERVAL_POD: "60000"
  COLLECTION_INTERVAL_DB2: "60000"
  COLLECTION_INTERVAL_STORAGE: "300000"
  COLLECTION_INTERVAL_BACKUP: "300000"
  LOG_LEVEL: "info"
  LOG_FILE: "logs/app.log"
  CORS_ORIGIN: "http://db2-day2ops-frontend:8080"
  WS_HEARTBEAT_INTERVAL: "30000"

---
apiVersion: v1
kind: Secret
metadata:
  name: db2-day2ops-backend-secret
  namespace: db2-day2ops
  labels:
    app: db2-day2ops
    component: backend
type: Opaque
stringData:
  DB2_PASSWORD: "db2inst1-pwd"

