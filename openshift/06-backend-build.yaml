---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: db2-day2ops-backend
  namespace: db2-day2ops
  labels:
    app: db2-day2ops
    component: backend
spec:
  output:
    to:
      kind: ImageStreamTag
      name: db2-day2ops-backend:latest
  source:
    type: Dockerfile
    dockerfile: |
      # Build stage
      FROM node:18-alpine AS builder
      WORKDIR /app
      COPY package*.json ./
      RUN npm ci
      COPY . .
      RUN npm run build

      # Production stage
      FROM node:18-alpine
      WORKDIR /app
      COPY package*.json ./
      RUN npm ci --only=production
      COPY --from=builder /app/dist ./dist
      RUN mkdir -p logs && chown -R node:node logs
      USER node
      EXPOSE 3001
      CMD ["node", "dist/index.js"]
    contextDir: backend
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers:
    - type: ConfigChange

---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: db2-day2ops-backend
  namespace: db2-day2ops
  labels:
    app: db2-day2ops
    component: backend

